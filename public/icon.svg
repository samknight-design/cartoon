<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#1d1940"/>
      <stop offset="100%" stop-color="#0A0818"/>
    </radialGradient>
    <radialGradient id="coin" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="60%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="3" fill="white" opacity="0.6"/>
  <circle cx="430" cy="100" r="2" fill="white" opacity="0.5"/>
  <circle cx="460" cy="400" r="3" fill="white" opacity="0.6"/>
  <circle cx="50" cy="420" r="2" fill="white" opacity="0.4"/>
  <circle cx="390" cy="50" r="2" fill="white" opacity="0.5"/>
  <!-- Coin -->
  <circle cx="175" cy="270" r="120" fill="url(#coin)" filter="url(#glow)" opacity="0.3"/>
  <circle cx="175" cy="270" r="110" fill="url(#coin)"/>
  <circle cx="175" cy="270" r="80" fill="#FFD700" opacity="0.4"/>
  <text x="175" y="315" font-size="110" text-anchor="middle" fill="#B8860B" font-family="serif">★</text>
  <!-- Gem -->
  <g filter="url(#glow)" opacity="0.3">
    <polygon points="337,130 410,260 337,390 264,260" fill="url(#gem)"/>
  </g>
  <polygon points="337,140 405,260 337,380 269,260" fill="url(#gem)"/>
  <polygon points="337,140 405,260 337,220" fill="white" opacity="0.3"/>
</svg>
