name: Build APK

on:
  push:
    branches:
      - claude/child-reward-app-mCkPP
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/RewardQuest.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RewardQuest-APK
          path: output/RewardQuest.apk
          retention-days: 90

      - name: Print download instructions
        run: |
          echo "✅ APK built successfully!"
          echo "📱 Download from the Actions tab → this run → Artifacts → RewardQuest-APK"
          echo "📲 On your Samsung: Settings → Apps → Install unknown apps → allow your browser"
          echo "📂 Open the downloaded APK to install"
